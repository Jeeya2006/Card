<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 300px;
            height: 450px;
            border: 2px solid black;
            margin-left: 40%;
        }
        .img{
            width: 300px;
            height: 200px;
            background-image: url(https://www.bing.com/th/id/OIP.Fun3wrXk25N4JxXl5Kl2LgHaFD?w=193&h=135&c=8&rs=1&qlt=90&o=6&dpr=1.5&pid=3.1&rm=2);
            border: 1px solid black;   
        }
        .sale{ 
           margin-top: 5px;
           margin-left: 5px;
            width: 33px;
            height: 15px;
            background-color: azure;
            display: inline-block;
            border-radius: 15%;
            
        }
        .heart{
            margin-top: 5px;
           margin-left: 230px;
            width: 22px;
            height: 21px;
            /* border: 2px solid black; */
            display: inline-block;
            border-radius: 50%;
            background-color: azure;
        }
        .details{
            color: black;
            
        }
        button{
            margin-left: 100px;
        }

    </style>
</head>
<body>
    <div class="card">
        <div class="img">
            <div class="sale">Sale</div>
            <div class="heart">❤️</div>
        </div>
        <div class="details"><h3>Details :-</h3><hr>
            Bedroom → for sleeping<br>
Kitchen → for cooking food<br>
Living room → for sitting, relaxing, and meeting guests<br>
Bathroom → for bathing and toilet use<br>
Dining room → for eating meals<br>
Study room → for reading or working</div>
<br>
<button>Add to Cart</button>
    </div>
</body>
</html>
